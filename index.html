<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="title">🏆 GAVABA SOLOQ CHALLENGE</div>

  <div class="topbar">
    <div class="chip">🔥 Live Ranking</div>
    <div class="chip">⚡ EUW Server</div>
  </div>

  <div class="layout">

    <div class="card">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="card">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  data.forEach((p, i) => {

    const isTop = i === 0;

    // SOLOQ CARD
    const soloCard = document.createElement("div");
    soloCard.className = "row " + (isTop ? "top" : "");
    soloCard.innerHTML = `
      <div class="rank">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">${p.solo.rank} ${p.solo.lp} LP</div>
    `;

    // FLEX CARD
    const flexCard = document.createElement("div");
    flexCard.className = "row";
    flexCard.innerHTML = `
      <div class="rank">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">${p.flex.rank} ${p.flex.lp} LP</div>
    `;

    solo.appendChild(soloCard);
    flex.appendChild(flexCard);
  });
}

loadPlayers();
</script>

</body>
</html>
