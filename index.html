<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🏆 Gavaba SoloQ Challenge</h1>

  <h2>🔥 SoloQ</h2>
  <div class="board" id="solo"></div>

  <h2>⚡ Flex</h2>
  <div class="board" id="flex"></div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  data.forEach((p, i) => {

    const soloRow = document.createElement("div");
    soloRow.className = "row";
    soloRow.innerHTML = `
      <span>${i + 1}</span>
      <span>${p.name}</span>
      <span>${p.solo.rank} ${p.solo.lp} LP</span>
    `;

    const flexRow = document.createElement("div");
    flexRow.className = "row";
    flexRow.innerHTML = `
      <span>${i + 1}</span>
      <span>${p.name}</span>
      <span>${p.flex.rank} ${p.flex.lp} LP</span>
    `;

    solo.appendChild(soloRow);
    flex.appendChild(flexRow);
  });
}

loadPlayers();
</script>

</body>
</html>
