<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba Cup</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    🏆 GAVABA CUP 🏆
  </div>

  <div class="container">

    <div class="panel">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="panel">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
function rankValue(rank, division, lp = 0) {
  const tiers = {
    "CHALLENGER": 10,
    "GRANDMASTER": 9,
    "MASTER": 8,
    "DIAMOND": 7,
    "EMERALD": 6,
    "PLATINUM": 5,
    "GOLD": 4,
    "SILVER": 3,
    "BRONZE": 2,
    "IRON": 1,
    "UNRANKED": 0
  };

  const div = {
    "I": 4,
    "II": 3,
    "III": 2,
    "IV": 1,
    "": 0
  };

  return tiers[rank] * 10000 + div[division] * 100 + lp;
}

const opggLinks = {
  "Hugo Peña#HPT": "https://op.gg/es/lol/summoners/euw/Hugo%20Pe%C3%B1a-HPT",
  "PONABE ZzZ#AKN": "https://op.gg/es/lol/summoners/euw/PONABE%20ZzZ-AKN",
  "elbaifoo#MVP": "https://op.gg/es/lol/summoners/euw/elbaifoo-mvp",
  "Guerra#SFC": "https://op.gg/es/lol/summoners/euw/Guerra-SFC",
  "JUNGLE#CAPI": "https://op.gg/es/lol/summoners/euw/JUNGLE-CAPI",
  "Gabriel Valiente#GGB": "https://op.gg/es/lol/summoners/euw/Gabriel%20Valiente-GGB",
  "Poli Sama#091": "https://op.gg/es/lol/summoners/euw/Poli%20Sama-091",
  "Wensel#777": "https://op.gg/es/lol/summoners/euw/Wensel-777",
  "EL BAIFO#MVP": "https://op.gg/es/lol/summoners/euw/EL%20BAIFO-MVP"
};

async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  const soloSorted = [...data].sort((a, b) =>
  rankValue(b.solo.rank, b.solo.division, b.solo.lp) -
  rankValue(a.solo.rank, a.solo.division, a.solo.lp)
  );

  const flexSorted = [...data].sort((a, b) =>
  rankValue(b.flex.rank, b.flex.division, b.flex.lp) -
  rankValue(a.flex.rank, a.flex.division, a.flex.lp)
  );
  
  soloSorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "row " + (i === 0 ? "top1" : "");
    row.style.animationDelay = `${i * 0.05}s`;

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">
        <a href="${opggLinks[p.name] || '#'}"
           target="_blank"
           rel="noopener noreferrer"
           style="color:inherit;text-decoration:none;">
          ${p.name}
        </a>
      </div>
      <div class="lp">
        <span class="rank ${p.solo.rank}">
          ${p.solo.rank} ${p.solo.division}
        </span>
        ${p.solo.lp} LP
      </div>
    `;

    solo.appendChild(row);
  });

  flexSorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "row " + (i === 0 ? "top1" : "");
    row.className = "row";
    row.style.animationDelay = `${i * 0.05}s`;

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">
        <a href="${opggLinks[p.name] || '#'}"
           target="_blank"
           rel="noopener noreferrer"
           style="color:inherit;text-decoration:none;">
          ${p.name}
        </a>
      </div>
      <div class="lp">
        <span class="rank ${p.flex.rank}">
          ${p.flex.rank} ${p.flex.division}
        </span>
        ${p.flex.lp} LP
      </div>
    `;

    flex.appendChild(row);
  });
}

loadPlayers();
</script>

</body>
</html>
