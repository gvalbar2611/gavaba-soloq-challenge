<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    🏆 SOLOQ CHALLENGE - GAVABA
  </div>

  <div class="container">

    <div class="panel">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="panel">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  // 🔥 ORDEN SOLOQ
  const soloSorted = [...data].sort((a, b) => b.solo.lp - a.solo.lp);

  // ⚡ ORDEN FLEX (INDEPENDIENTE)
  const flexSorted = [...data].sort((a, b) => b.flex.lp - a.flex.lp);

  // SOLOQ TABLE
  soloSorted.forEach((p, i) => {

    const row = document.createElement("div");
    row.className = "row " + (i === 0 ? "top1" : "");

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.solo.rank}">
          ${p.solo.rank} ${p.solo.division}
        </span>
        ${p.solo.lp} LP
      </div>
    `;

    solo.appendChild(row);
  });

  // FLEX TABLE
  flexSorted.forEach((p, i) => {

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.flex.rank}">
          ${p.flex.rank} ${p.flex.division}
        </span>
        ${p.flex.lp} LP
      </div>
    `;

    flex.appendChild(row);
  });
}

loadPlayers();
</script>

</body>
</html>
