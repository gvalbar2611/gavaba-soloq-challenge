<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Stream</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    🏆 GAVABA SOLOQ CHALLENGE
  </div>

  <div class="grid">

    <div class="panel">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="panel">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  data.forEach((p, i) => {

    const isTop = p.top ? "TOP1" : "";

    const soloRow = document.createElement("div");
    soloRow.className = "row " + (p.top ? "top1" : "");
    soloRow.innerHTML = `
      <span class="rank">${i + 1}</span>
      <span class="name">${p.name}</span>
      <span class="lp">${p.solo.rank} ${p.solo.lp} LP ${isTop}</span>
    `;

    const flexRow = document.createElement("div");
    flexRow.className = "row";
    flexRow.innerHTML = `
      <span class="rank">${i + 1}</span>
      <span class="name">${p.name}</span>
      <span class="lp">${p.flex.rank} ${p.flex.lp} LP</span>
    `;

    solo.appendChild(soloRow);
    flex.appendChild(flexRow);
  });
}

loadPlayers();
</script>

</body>
</html>
