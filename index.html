<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge PRO 4</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <h1>🏆 Gavaba SoloQ Challenge</h1>

  <div class="tabs">
    <button>SoloQ</button>
    <button>Flex</button>
  </div>

  <div class="board" id="board">

    <div class="row head">
      <span>#</span>
      <span>Jugador</span>
      <span>LP</span>
    </div>

    <div class="row" data-lp="780">
      <span class="rank"></span>
      <span>EL BAIFO #MVP</span>
      <span class="lp">780</span>
    </div>

    <div class="row" data-lp="760">
      <span class="rank"></span>
      <span>elbaifoo #mvp</span>
      <span class="lp">760</span>
    </div>

    <div class="row" data-lp="690">
      <span class="rank"></span>
      <span>Guerra #SFC</span>
      <span class="lp">690</span>
    </div>

    <div class="row" data-lp="640">
      <span class="rank"></span>
      <span>Wensel #777</span>
      <span class="lp">640</span>
    </div>

    <div class="row" data-lp="610">
      <span class="rank"></span>
      <span>Hugo Peña #HPT</span>
      <span class="lp">610</span>
    </div>

    <div class="row" data-lp="590">
      <span class="rank"></span>
      <span>Gabriel Valiente #GGB</span>
      <span class="lp">590</span>
    </div>

    <div class="row" data-lp="520">
      <span class="rank"></span>
      <span>JUNGLE #CAPI</span>
      <span class="lp">520</span>
    </div>

    <div class="row" data-lp="430">
      <span class="rank"></span>
      <span>Poli Sama #091</span>
      <span class="lp">430</span>
    </div>

    <div class="row" data-lp="380">
      <span class="rank"></span>
      <span>PONABE ZzZ #AKN</span>
      <span class="lp">380</span>
    </div>

  </div>

<script>
function sortBoard() {
  const board = document.getElementById("board");
  const rows = Array.from(board.querySelectorAll(".row:not(.head)"));

  rows.sort((a, b) => b.dataset.lp - a.dataset.lp);

  rows.forEach((row, i) => {
    row.querySelector(".rank").textContent = i + 1;
    board.appendChild(row);
  });
}

sortBoard();
</script>

</body>
</html>
