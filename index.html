<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🏆 Gavaba SoloQ Challenge</h1>

  <div class="board">

    <div class="row head">
      <span>#</span>
      <span>Jugador</span>
      <span>Level</span>
    </div>

    <div id="players"></div>

  </div>

<script>
async function loadPlayers() {
  try {
    const res = await fetch("/api/lol");
    const data = await res.json();

    console.log("API DATA:", data); // 👈 importante para debug

    const container = document.getElementById("players");

    if (!container) {
      console.error("NO EXISTE #players");
      return;
    }

    container.innerHTML = "";

    data.forEach((p, i) => {
      const row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <span>${i + 1}</span>
        <span>${p.name ?? "unknown"}</span>
        <span>${p.level ?? 0}</span>
      `;

      container.appendChild(row);
    });

  } catch (err) {
    console.error("ERROR FETCH:", err);
  }
}

loadPlayers();
</script>

</body>
</html>
