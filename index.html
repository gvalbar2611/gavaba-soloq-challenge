<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🏆 Gavaba SoloQ Challenge</h1>

  <div class="board">

    <div class="row head">
      <span>#</span>
      <span>Jugador</span>
      <span>Level</span>
    </div>

    <div id="players"></div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const container = document.getElementById("players");
  container.innerHTML = "";

  data.forEach((p, i) => {

    const rankClass = `rank-${(p.rank || "UNRANKED").toUpperCase()}`;

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <span>${i + 1}</span>
      <span>${p.name}</span>
      <span>
        <span class="rank-badge ${rankClass}">
          ${p.rank || "UNRANKED"} ${p.lp || 0} LP
        </span>
      </span>
    `;

    container.appendChild(row);
  });
}

loadPlayers();
</script>

</body>
</html>
