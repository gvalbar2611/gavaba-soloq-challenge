<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    🏆 SOLOQ CHALLENGE - GAVABA
  </div>

  <div class="container">

    <div class="panel">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="panel">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
function rankValue(rank, division) {
  const tiers = {
    "CHALLENGER": 10,
    "GRANDMASTER": 9,
    "MASTER": 8,
    "DIAMOND": 7,
    "EMERALD": 6,
    "PLATINUM": 5,
    "GOLD": 4,
    "SILVER": 3,
    "BRONZE": 2,
    "IRON": 1,
    "UNRANKED": 0
  };

  const div = {
    "I": 4,
    "II": 3,
    "III": 2,
    "IV": 1,
    "": 0
  };

  return (tiers[rank] * 10) + (div[division] || 0);
}

async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  const soloSorted = [...data].sort((a, b) =>
    rankValue(b.solo.rank, b.solo.division) -
    rankValue(a.solo.rank, a.solo.division)
  );

  const flexSorted = [...data].sort((a, b) =>
    rankValue(b.flex.rank, b.flex.division) -
    rankValue(a.flex.rank, a.flex.division)
  );

  soloSorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "row " + (i === 0 ? "top1" : "");
    row.style.animationDelay = `${i * 0.05}s`;

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.solo.rank}">
          ${p.solo.rank} ${p.solo.division}
        </span>
        ${p.solo.lp} LP
      </div>
    `;

    solo.appendChild(row);
  });

  flexSorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.style.animationDelay = `${i * 0.05}s`;

    row.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.flex.rank}">
          ${p.flex.rank} ${p.flex.division}
        </span>
        ${p.flex.lp} LP
      </div>
    `;

    flex.appendChild(row);
  });
}

loadPlayers();
</script>

</body>
</html>
