<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <div class="logo">🏆 SOLOQ CHALLENGE</div>
    <div class="subtitle">Gavaba Edition</div>
  </div>

  <div class="container">

    <!-- SOLOQ -->
    <div class="panel">
      <div class="panel-title">🔥 SoloQ</div>
      <div class="table" id="solo"></div>
    </div>

    <!-- FLEX -->
    <div class="panel">
      <div class="panel-title">⚡ Flex</div>
      <div class="table" id="flex"></div>
    </div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  data.forEach((p, i) => {

    const top = i === 0 ? "top1" : "";

    // SOLOQ ROW
    const soloRow = document.createElement("div");
    soloRow.className = `row ${top}`;
    soloRow.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">${p.solo.rank} ${p.solo.lp} LP</div>
    `;

    // FLEX ROW
    const flexRow = document.createElement("div");
    flexRow.className = `row`;
    flexRow.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">${p.flex.rank} ${p.flex.lp} LP</div>
    `;

    solo.appendChild(soloRow);
    flex.appendChild(flexRow);
  });
}

loadPlayers();
</script>

</body>
</html>
