<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gavaba SoloQ Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    🏆 SOLOQ CHALLENGE - GAVABA
  </div>

  <div class="container">

    <div class="panel">
      <h2>🔥 SoloQ</h2>
      <div id="solo"></div>
    </div>

    <div class="panel">
      <h2>⚡ Flex</h2>
      <div id="flex"></div>
    </div>

  </div>

<script>
async function loadPlayers() {
  const res = await fetch("/api/lol");
  const data = await res.json();

  const solo = document.getElementById("solo");
  const flex = document.getElementById("flex");

  solo.innerHTML = "";
  flex.innerHTML = "";

  data.forEach((p, i) => {

    const soloRow = document.createElement("div");
    soloRow.className = "row " + (i === 0 ? "top1" : "");
    soloRow.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.solo.rank}">
          ${p.solo.rank} ${p.solo.division}
        </span>
        ${p.solo.lp} LP
      </div>
    `;

    const flexRow = document.createElement("div");
    flexRow.className = "row";
    flexRow.innerHTML = `
      <div class="pos">#${i + 1}</div>
      <div class="name">${p.name}</div>
      <div class="lp">
        <span class="rank ${p.flex.rank}">
          ${p.flex.rank} ${p.flex.division}
        </span>
        ${p.flex.lp} LP
      </div>
    `;

    solo.appendChild(soloRow);
    flex.appendChild(flexRow);
  });
}

loadPlayers();
</script>

</body>
</html>
