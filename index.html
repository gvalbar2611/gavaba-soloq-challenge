<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gavaba - Live Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  <div class="bg"></div>

  <!-- HEADER -->
  <header class="topbar">
    <div class="logo">GAVABA</div>
    <div class="live">🔴 LIVE</div>
    <button class="btn">Ver directo</button>
  </header>

  <!-- HERO STREAM -->
  <section class="hero">
    <div class="stream-main glass">
      🎥 STREAM PRINCIPAL
    </div>

    <div class="stream-side">
      <div class="glass small">📺 Cámara</div>
      <div class="glass small">🎮 Secundario</div>
    </div>
  </section>

  <!-- POKÉMON OVERLAY -->
  <section class="pokemons">
    <h2>🔥 Equipo Pokémon</h2>
    <div class="grid">
      <div class="card glass">Pokémon 1</div>
      <div class="card glass">Pokémon 2</div>
      <div class="card glass">Pokémon 3</div>
      <div class="card glass">Pokémon 4</div>
      <div class="card glass">Pokémon 5</div>
      <div class="card glass">Pokémon 6</div>
    </div>
  </section>

  <!-- STATS -->
  <section class="stats">
    <div class="glass stat">🏆 Wins: 12</div>
    <div class="glass stat">💀 Losses: 4</div>
    <div class="glass stat">🔥 Win Streak: 5</div>
    <div class="glass stat">📊 Rank: Master</div>
  </section>

  <footer>
    Made for Gavaba 💙💚
  </footer>
</body>
</html>
